<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { display: grid; min-height: 100vh; background:var(--glass)}



.augfiguration {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  aspect-ratio: 5 / 4;
  --width: min(100vw, 90vh / 4 * 5);
  width: var(--width);

}


.viewport {
    background: #080820;
    /* --mask: var(--pxmaskimg) 0 0 / 1.25vmin 1.25vmin; */
    /* -webkit-mask: var(--mask); */
    /* mask: var(--mask); */
    display: flex;
    align-items: center;
    justify-content: center;
width: 98%;
    height: 100vh;
}

.blackout {
  clip-path: none;
  pointer-events: none;
      /*filter: blur(calc(var(--width) * 0.005)) drop-shadow(0 0 1vh black);*/
      height: 100%;
    width: 100%;
}





.redline {
  --width: calc(min(100vw, 63vh / 4 * 5) * 0.95);
  --aug-t: (var(--width) * 0.06);
  --aug-b: (var(--width) * 0.06);
  --aug-t-extend1: 35%;
  --aug-b-extend1: 35%;
  --aug-border-all: calc(var(--width) * 0.006);
  --aug-border-bg: linear-gradient(90deg,#00ff88,#00d1ff);
      width: 98%;
    height: 90%;
}

.dotdecor {
  --width: calc(min(100vw, 90vh / 4 * 5) * 0.91);
  --aug-border-all: calc(var(--width) * 0.01);
  --aug-border-bg: linear-gradient(to bottom, transparent 20%, rgb(255 255 255 / 50%), transparent 80%);
      width: 95%;
    height: 84%;
}
.dotdecor::after {
  --mask: repeating-linear-gradient(
    to bottom,
    black 0px var(--aug-border-all),
    transparent var(--aug-border-all) calc(var(--aug-border-all) * 3)
  );
  -webkit-mask: var(--mask);
  mask: var(--mask);
}

.beacon {
  z-index: 9;
  position: absolute;
  bottom: 0%;
  right: 0%;
  width: 8%;
  aspect-ratio: 1 / 1;
  --scalar: (var(--width) / 100);
background: radial-gradient(
  circle at center,
  var(--neon) calc(0.5 * var(--scalar)),
  transparent calc(0.5 * var(--scalar)) calc(1.1 * var(--scalar)),
  var(--accent) calc(1.2 * var(--scalar)) calc(1.3 * var(--scalar)),
  transparent calc(1.4 * var(--scalar)) calc(2 * var(--scalar)),
  var(--accent) calc(2 * var(--scalar)) calc(2.1 * var(--scalar)),
  transparent calc(2.1 * var(--scalar)) calc(2.7 * var(--scalar)),
  var(--accent) calc(2.7 * var(--scalar)) calc(2.8 * var(--scalar)),
  transparent calc(3 * var(--scalar))
);
  opacity: 0.8;
  filter: drop-shadow(0 0 calc(0.5 * var(--scalar)) var(--neon));
}

@keyframes beacon {
  from {
    zoom: 8;
    transform: scale(0.125);
    opacity: 1;
  }
  to {
    zoom: 1;
    transform: scale(1);
    opacity: 0.25;
  }
}
.beacon::after {
  content: "";
  position: absolute;
  inset: 14%;
  border: calc(0.25 * var(--scalar)) solid var(--neon);
  border-radius: 50%;
  zoom: 1;
  transform: scale(0.5);
  animation: beacon 1.5s linear infinite;
}

.tunnel {
  pointer-events: none;
  list-style: none;
  position: absolute;
  inset: 0;
  overflow: hidden;
  --time: 3.5s;
}
.tunnel::after {
  content: "";
  z-index: 100;
  position: absolute;
  aspect-ratio: 1 / 1;
  inset: 44%;
  top: 37.5%;
  border-radius: 50%;
  background: radial-gradient(
    circle at center,
    black,
    transparent
  );
}
@keyframes zoomzoom {
  from {
    z-index: 1;
    transform: scale(0.125);
  }
  to {
    z-index: 10;
    transform: scale(2);
  }
}
.tunnel > * {
  position: absolute;
  top: -10%;
  --aug-border-all: calc(var(--width) / 10);
  --aug-all-width: var(--width);
  --aug-border-bg: radial-gradient(
    circle at center 60%,
    navy,
    #112 50%,
    transparent 65%
  );
  clip-path: none;
  filter: drop-shadow(0 0 calc(var(--width) / 20) rgb(0 0 0 / 0.5));
  transform: scale(0.125);
  animation: zoomzoom var(--time) cubic-bezier(1, 0, 0.9, 0.45) infinite;
}
.tunnel > :nth-child(1) { animation-delay: calc(var(--time) / 5); z-index: 5; }
.tunnel > :nth-child(2) { animation-delay: calc(var(--time) / 5 * 2); z-index: 4; }
.tunnel > :nth-child(3) { animation-delay: calc(var(--time) / 5 * 3); z-index: 3; }
.tunnel > :nth-child(4) { animation-delay: calc(var(--time) / 5 * 4); z-index: 2; }
.tunnel > :nth-child(5) { animation-delay: calc(var(--time)); z-index: 1; }

    0% 0%,    /* top-left */
    100% 0%,  /* top-right */
    90% 100%, /* bottom-right */

  );

    justify-content: center;
    backdrop-filter: blur(4px);

        padding-top: 10px;

}


.bottom-decoration {
position: absolute;
    /* bottom: -1px; */
    /* position: absolute; */
width: 34.2%;
    height: 4.8%;
    left: 32.9%;
    z-index: 5;
    color: #fff;
    text-align: center;
    display: flex;
    align-items: flex-start;
    bottom: 00px;
    justify-content: flex-start;

  /* Clip-path for \_______/ shape */

    10% 0%,  /* top-left corner */
    90% 0%,  /* top-right corner */

  );
    backdrop-filter: blur(4px);

        background:var(--glass);
        padding-top: 10px;
    padding-bottom: 10px;
        align-items: center;
    justify-content: center;
}



.the-future-is-augmented {
  position: absolute;
  top: 12%;
  left: 0;
  right: 0;
  text-align: center;
  font-size: calc(var(--width) / 25);
  text-decoration: none;
  font-family: sans-serif;
  color: #c25802;
  opacity: 0.9;
  background: linear-gradient(
    to right,
    #c25802 40%,
    #ec910f 51% 54%,
    #c25802 60%
  );
  -webkit-text-fill-color: transparent;
  -webkit-background-clip: text;

}

 :root{
    --neon: #00ff88;
    --neon-dim: rgba(0,255,136,0.18);
    --glass: rgba(0,0,0,0.45);
    --accent: #00d1ff;
    --bg: #000;
    --font: "Segoe UI", Roboto, "Helvetica Neue", Arial, monospace;
  }

  *{box-sizing:border-box}
  html,body{height:100%;margin:0;background:var(--glass);font-family:var(--font);-webkit-font-smoothing:antialiased}
  .video-container{position:relative;width:100vw;height:100vh;overflow:hidden;display:block}

/* camera/video (placeholder: black) */
  #camera{width:100%;height:100%;object-fit:cover;background:linear-gradient(180deg,#010101 0%, #001214 100%)}

/* outer glowing frame */
  .hud-frame{
    inset:10px;
  }
  .hud-glow{
    position:absolute;inset:-40px;
    background:radial-gradient(closest-side, rgba(0,255,136,0.06), transparent 35%),
               radial-gradient(closest-side, rgba(0,209,255,0.03), transparent 25%);
    filter:blur(18px);mix-blend-mode:screen;pointer-events:none;
    animation:glowShift 8s linear infinite;
  }
  @keyframes glowShift{0%{transform:translateX(-6%)}50%{transform:translateX(6%)}100%{transform:translateX(-6%)}}

/* HUD surface */
  .hud{
    position:absolute;inset:0;padding:14px;pointer-events:none;color:var(--neon);

  }

/* top center mode + small indicator */
  .mode-status{
    position:absolute;left:50%;top:80px;transform:translateX(-50%);
    background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.00));
    border:1px solid var(--neon-dim);padding:6px 12px;border-radius:8px;font-size:13px;
    display:flex;gap:10px;align-items:center;backdrop-filter:blur(4px);
  }
  .mode-led{width:10px;height:10px;border-radius:50%;box-shadow:0 0 6px var(--neon);background:var(--neon)}

/* left / right stat columns (military) */
  .stat{font-family: Orbitron;
    position:absolute;top:50%;transform:translateY(-50%);width:105px;background:var(--glass);
    border-radius:10px;padding:8px;
    text-align:center;backdrop-filter:blur(4px);
  }
  .speed{left:18px}
  .alt{right:18px}
  .stat .label{font-size:11px;opacity:0.7}
  .stat .value{font-size:22px;font-weight:700;letter-spacing:1px}

/* vertical speed block */
  .vspeed{right:140px;top:50%;transform:translateY(-50%);width:90px;padding:8px}

/* heading tape (inertial) */
.heading-wrap {
    position: absolute;
    left: 50%;
    bottom: 60px;
    transform: translateX(-50%);
    width: 37%;
    height: 30px;
    overflow: hidden;
    border-radius: 10px;
    padding: 6px;
    background: linear-gradient(180deg, rgba(0, 0, 0, 0.25), rgba(0, 0, 0, 0.12));
    border: 1px solid var(--neon-dim);
    z-index: 999999999999999999999999999;
    backdrop-filter: blur(4px);
    /* NEW → fade edges from 100 → 0 opacity */
    mask-image: linear-gradient(
        to right, 
        transparent 0%,        /* fully hidden at far left */
        black 50%,             /* fade in by 20% */
        black 80%,             /* full visible center */
        transparent 100%       /* fade out to hidden */
    );

    -webkit-mask-image: linear-gradient(
        to right,
        transparent 0%,
        black 50%,
        black 80%,
        transparent 100%
    );
}

.heading-center-box {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 60px;
    height: 26px;
    transform: translate(-50%, -50%);
    border: 2px solid var(--neon);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 600;
    color: var(--neon);
    z-index: 9999999999;
    pointer-events: none;
    background: #000;z
    -index: 999999999999999999999999999999999999999999999999999999999999999999999;
}


  .heading-tape{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);white-space:nowrap;font-size:15px;z-index: 1999999999999999999999999999;  }
  .heading-major{display:inline-block;padding:0 12px;font-weight:700;z-index: 2999999999999999999999999999;}

/* 3D horizon arc background */
  .horizon-zone{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
  .horizon-3d{
    width:77%;height:54%;max-height:520px;border-radius:50%/20%;
    transform-origin:center center;overflow:visible;filter:drop-shadow(0 6px 18px rgba(0,255,136,0.06));
    position:relative;
  }
  .horizon-sky{position:absolute;inset:0;background:linear-gradient(180deg, rgba(0,33,0,0.12) 0%, rgba(0,0,0,0.0) 55%);border-radius:inherit}
  .horizon-line{
    position:absolute;left:0;right:0;top:49.7%;height:2px;background:linear-gradient(90deg,var(--neon),var(--accent));
    box-shadow:0 0 14px rgba(0,255,136,0.35);
    transform-origin:center center;
  }

/* pitch ladder as arc segments */
  .pitch-ladder{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:420px;height:420px;border-radius:50%;
    pointer-events:none;opacity:0;transition:opacity .8s;}
  .pitch-ladder.visible{opacity:1}
  .pitch-tick{
    position:absolute;left:50%;top:50%;transform-origin:50% 0%;
    font-size:13px;text-align:center;width:260px;margin-left:-130px;color:var(--neon);
  }
  /* ticks are placed with JS along arc */

/* center crosshair + racing accents */
  .center-reticle{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);pointer-events:none}
  .reticle-h{width:160px;height:2px;background:var(--neon);box-shadow:0 0 12px var(--neon)}
  .reticle-v{width:2px;height:160px;background:var(--neon);margin:-80px auto -80px;box-shadow:0 0 12px var(--neon)}
  .reticle-corner{position:absolute;width:22px;height:22px;border:2px solid var(--neon);opacity:0.9;border-radius:4px}
  .reticle-corner.tl{left:-190px;top:-90px;transform:translate(0,0) rotate(0deg)}
  .reticle-corner.bl{left:-190px;bottom:-90px}
  .reticle-corner.tr{right:-190px;top:-90px}
  .reticle-corner.br{right:-190px;bottom:-90px}

/* racing sweep animation (thin arc that pulses) */
  .racing-arc{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:420px;height:420px;border-radius:50%;
    pointer-events:none;border:1px dashed rgba(0,255,136,0.06);
  }
  .sweep{
    position:absolute;left:50%;top:50%;transform-origin:0 0; width:220px;height:220px;border-radius:50%;
    border-top:2px solid rgba(0,255,136,0.65);opacity:0.9;
    animation:sweepRotate 3s linear infinite;
    mix-blend-mode:screen;
  }
  @keyframes sweepRotate{0%{transform:rotate(0deg) translate(-50%,-50%)}100%{transform:rotate(360deg) translate(-50%,-50%)}}


  .bar{width:180px;height:10px;border-radius:6px;background:#ffffff78;overflow:hidden;border:1px solid rgba(255,255,255,0.02)}
  .bar-fill{height:100%;width:60%;background:linear-gradient(90deg,var(--neon),var(--accent));box-shadow:0 0 8px rgba(0,255,136,0.25);}
  .tele-row{display:flex;gap:10px;align-items:center;font-size:13px;color:var(--neon);    width: calc(100% - 150px);font-family: Orbitron;
    align-items: center;}

/* sat icons */
  .sats{display:flex;gap:6px;align-items:center}
  .sat{width:8px;height:8px;border-radius:50%;background:rgba(0,255,136,0.6);}

/* small HUD elements */
  .mini{
/* 
border:1px solid rgba(0,255,136,0.04);
font-size:12px;
*/

    position:absolute;padding:6px 8px;border-radius:8px;background:rgba(0,0,0,0.4);
    
    backdrop-filter: blur(4px);
  }

  .mini.right-top{justify-self: right;}

/* crosshair pulse */
  .pulse {
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:26px;height:26px;border-radius:50%;
    border:2px solid rgba(0,255,136,0.15);
    animation:ping 1.6s infinite;
  }
  @keyframes ping{0%{transform:translate(-50%,-50%) scale(.8);opacity:1}70%{transform:translate(-50%,-50%) scale(2.2);opacity:0}100%{opacity:0}}

/* small responsive tweaks */
  @media (max-width:720px){
    .heading-wrap{width:90%}
    .stat{display:none}
    .horizon-3d{width:94%}
    .reticle-h{width:110px}
    .reticle-v{height:110px}
  }

/* HUD bottom-left telemetry smalls (GPS / sats / battery) */
  .tele-bottom{
    position:absolute;left:18px;bottom:18px;display:flex;flex-direction:column;gap:8px;padding:8px;border-radius:10px;background:var(--glass);
    backdrop-filter: blur(4px);
  }

</style>

<body translate="no">  


  <div class="augfiguration viewport" data-augmented-ui="t-clip-x b-clip-x">








<div class="video-container">


    <video id="camera" autoplay muted loop>
        <source src="/static/Video/Untitled Project.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>


  <div class="hud-frame">
    <div class="hud-glow"></div>

    <div class="hud">

      <!-- MODE and LED -->
      <div class="mode-status"><div class="mode-led" id="modeLed"></div><div id="modeText">MODE: STABILIZE</div></div>

      <!-- top left mini -->
      <div class="mini left-top" id="mission">FPV • PRO</div>
      <div class="mini right-top" id="arm">ARM: DISARM</div>

      <!-- left / right stats -->
      <div class="stat speed"><div class="label">SPD</div><div class="value" id="spdVal">0</div></div>
      <div class="stat alt"><div class="label">ALT</div><div class="value" id="altVal">0</div></div>

      <!-- horizon + 3D arc -->
      <div class="horizon-zone">
        <div class="horizon-3d" id="horizon3d">
          <div class="horizon-sky"></div>
          <div class="horizon-line" id="horizonLine"></div>

          <div class="pitch-ladder" id="pitchLadder"></div>

          <div class="racing-arc" aria-hidden="true">
            <div class="sweep"></div>
          </div>

        </div>
      </div>

      <!-- center reticle -->
      <div class="center-reticle">
        <div class="reticle-h"></div>
        <div class="reticle-v"></div>
        <div class="pulse"></div>
      </div>

      <!-- large corner markers (subtle) -->
      <div class="reticle-corner tl"></div><div class="reticle-corner tr"></div>
      <div class="reticle-corner bl"></div><div class="reticle-corner br"></div>



      <!-- heading tape with inertial smoothing -->
      <div class="heading-wrap"><div class="heading-tape" id="headingTape"></div><div class="heading-center-box" id="headingBox"></div></div>

3 11.508 30.375 26.941 34.007v108.857l-58.47 36.864zm-155.1-21.413v58.621l151.359-95.407v-48.413l-52.81-52.814-37.391 80.515a8.012 8.012 0 0 1-1.818 2.491l-59.34 55.008zm221.57-139.374c-10.45 0-18.94-8.495-18.94-18.94V136.15c0-10.441 8.49-18.94 18.94-18.94s18.94 8.499 18.94 18.94v82.517c0 10.445-8.504 18.94-18.94 18.94zm235.002 130.014-60.75-56.309-41.545-89.463h-.004L300.576 31.487c-8.252-17.837-24.921-28.488-44.571-28.488s-36.319 10.652-44.581 28.488l-88.131 190.361-41.549 89.463-60.75 56.309a8.008 8.008 0 0 0-2.56 5.871V450.1a7.994 7.994 0 0 0 4.14 7.002c1.2.669 2.532.998 3.861.998a7.992 7.992 0 0 0 4.268-1.227l101.603-64.052V501a8.002 8.002 0 0 0 8.001 8 7.986 7.986 0 0 0 5.66-2.34l53.488-53.497a7.982 7.982 0 0 0 2.34-5.651v-37.94l54.211-34.172 54.197 34.172v37.94c0 2.12.843 4.149 2.34 5.651l53.501 53.497a7.994 7.994 0 0 0 8.71 1.731 8.007 8.007 0 0 0 4.941-7.391V392.821l101.608 64.052a7.988 7.988 0 0 0 4.264 1.227c1.328 0 2.661-.33 3.87-.998a7.985 7.985 0 0 0 4.131-7.002v-76.609c0-2.23-.934-4.36-2.56-5.871zm-218.914 78.111-16.088 35.77-16.092-35.77v-15.14l16.092-10.139 16.088 10.139zm12.259-26.322a8.012 8.012 0 0 1 3.741 6.773v21.271a7.877 7.877 0 0 1-.71 3.279l-24.088 53.552c-1.292 2.867-4.14 4.717-7.291 4.717s-6.013-1.85-7.3-4.717l-24.092-53.552a8.093 8.093 0 0 1-.701-3.279v-21.271a8.024 8.024 0 0 1 3.732-6.773l24.088-15.176a7.958 7.958 0 0 1 8.531 0l24.088 15.176z" opacity="1" data-original="#242222" class=""></path></g></g></svg>`;

let displayYaw = 0;
let numberWidth = 0;




socket.on('telemetry', data => {

document.getElementById('batFill').style.width = `${Math.max(0,Math.min(100,data.battery))}%`;

document.getElementById('altVal').textContent = Math.round(data.alt);

document.getElementById('LON').textContent = data.lat;
document.getElementById('LAT').textContent = data.lon;



  document.getElementById('headingBox').textContent = Math.round(data.yaw);
  // smoothing
  const yawDiff = shortestAngleDiff(displayYaw, yaw);
  displayYaw = (displayYaw + yawDiff * 0.06 + 360) % 360;
  const pxPerDeg = 3.2;
  headingTapEl.style.transform = `translate(calc(-50% - ${displayYaw * pxPerDeg}px), -50%)`;


  document.getElementById('satCount').textContent = String(Math.round(data.stateAntain)).padStart(2, '0');
  document.getElementById('satRow').innerHTML = '';
  for(let i = 0; i < Math.round(data.stateAntain); i++){
    const s = document.createElement('div');
    s.className = 'sat';
    s.style.opacity = 1; // all visible
    document.getElementById('satRow').appendChild(s);
}



document.getElementById('batteryValt').textContent = `${String(Math.round(data.batteryValt)).padStart(2, '0')} V`;

const hours = data.batteryHour / 60;
document.getElementById('batteryHour').textContent = `${hours.toFixed(1).padStart(4, '0')} H`;



// Update drone position
droneMarker.setLatLng([data.lat, data.lon]);
// Always center the map on the drone
map.panTo([data.lat, data.lon], { animate: true, duration: 0.5 }); // smooth pan


});








/* fill heading tape numbers */
(function createHeadingTape(){
  const arr = [];
  for (let r = 0; r < 3; r++) {      // repeat 3 times for seamless loop
    for (let i = 0; i < 360; i += 10) {
      arr.push(`<span class="heading-major">${i}</span>`);
    }
  }
  headingTapEl.innerHTML = arr.join('');
})();















/* ============================
   Pitch ladder: create arc ticks
   ============================ */
(function createPitchTicks(){
  const ticks = [-40,-30,-20,-10,0,10,20,30,40];
  const radius = 180;
  ticks.forEach((v, idx) => {
    const el = document.createElement('div');
    el.className='pitch-tick';
    el.textContent = (v>0?`+${v}`:v);
    // transformed later each frame
    pitchLadder.appendChild(el);
  });
})();

/* ============================
   Smooth/inertial heading (lerp)
   ============================ */
function lerp(a,b,t){return a+(b-a)*t}
function shortestAngleDiff(a,b){
  let d = (b - a + 540) % 360 - 180;
  return d;
}

/* ladder visibility */
let lastPitchMove = Date.now();
let ladderVisible = true;


ladderVisible = true; pitchLadder.classList.add('visible');
/* update loop */
function updateHUD(){
  // smoothing
  const yawDiff = shortestAngleDiff(displayYaw, yaw);
  displayYaw = (displayYaw + yawDiff * 0.06 + 360) % 360;

  // rotate horizon (roll) and apply slight perspective tilt from pitch
  horizon3d.style.transform = `rotate(${roll}deg) perspective(800px) rotateX(${pitch*0.08}deg)`;
  horizonLine.style.top = `${50 - pitch*0.8}%`;

  // place pitch ticks on an arc (simulate 3D curved ladder)
  const ticks = pitchLadder.querySelectorAll('.pitch-tick');
  const center = {x:0,y:0};
  const arcRadius = 190;
  ticks.forEach((tEl, i) => {
    const val = parseInt(tEl.textContent);
    // angle offset per degree
    const degOffset = (val - pitch) * 0.9; // sensitivity
    const angle = degOffset * Math.PI/180; // radians
    const x = Math.sin(angle) * arcRadius;
    const y = Math.cos(angle) * arcRadius * 0.45; // squash for ellipse
    const scale = 1 - Math.abs(degOffset)/120;
    tEl.style.transform = `translate(${x}px, ${y}px) scale(${Math.max(scale,0.55)})`;
    tEl.style.opacity = `${Math.max(0.06, scale)}`;
  });



  // telemetry bars
  
  gpsFill.style.width = `${Math.max(0,Math.min(100,gps))}%`;

  // sats

  // ladder auto-hide/show
  if(Math.abs(pitch) > 1.2){
    lastPitchMove = Date.now(); 
  } else {
    if(Date.now() - lastPitchMove > 2000) hideLadder();
  }

  // mode & arm
  modeText.textContent = `MODE: ${mode}`;
  modeLed.style.background = mode.startsWith('STAB') ? 'var(--neon)' : 'var(--accent)';
  armEl.textContent = `ARM: ${armed? 'ARMED' : 'DISARM'}`;
  armEl.style.borderColor = armed ? 'rgba(0,255,136,0.14)' : 'rgba(255,0,0,0.04)';

  requestAnimationFrame(updateHUD);
}
requestAnimationFrame(updateHUD);

/* ============================
   DEMO telemetry generator
   Remove/replace this with real telemetry updates
   ============================ */
setInterval(()=>{
  const t = Date.now();
  pitch = Math.sin(t/900)*12 + Math.sin(t/4300)*4;
  roll  = Math.sin(t/1600)*24;
  yaw   = (yaw + 0.45 + Math.sin(t/2200)*0.2) % 360;
  speed = 40 + Math.sin(t/600)*12;
  altitude = 120 + Math.sin(t/1400)*30;
  vspeed = Math.sin(t/800)*2;
  // battery slowly drops, gps varies, sats vary
  battery = 86 - (t/100000)%32;
  gps = 72 + Math.floor(Math.sin(t/1500)*10);
  sats = 5 + Math.max(0, Math.round(Math.abs(Math.sin(t/900))*6));
  // toggle armed randomly for demo
  if(Math.random()<0.002) armed=!armed;
  // change mode occasionally
  if(Math.random()<0.0015) mode = ['STABILIZE','ACRO','ALT_HOLD','LOITER','RACE'][Math.floor(Math.random()*5)];
}, 50);
























  // ----- Tile Layers -----
  var satellite = L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
    maxZoom: 20,
    subdomains:['mt0','mt1','mt2','mt3']
  });
  var dark = L.tileLayer('https://tiles.stadiamaps.com/tiles/alidade_dark/{z}/{x}/{y}{r}.png', { maxZoom: 20 });
  var topo = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { maxZoom: 17 });

  streets.addTo(map);

  // Layer control
  var baseMaps = { "Streets": streets, "Satellite": satellite, "Topographic": topo };
  L.control.layers(baseMaps).addTo(map);



</script>
